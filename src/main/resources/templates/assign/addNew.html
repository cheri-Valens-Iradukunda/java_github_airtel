<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assignment Form</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; }
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">
    <h2>Assign Device</h2>

    <form th:action="@{/assign/}" th:object="${assignment}" method="post">

        <input type="hidden" th:field="*{id}" />

        <!-- Device -->
        <label>Device</label>
        <select th:field="*{device}">
            <option value="">-- Select Device --</option>
            <option th:each="d : ${devices}"
                    th:value="${d.id}"
                    th:text="${d.serialNumber + ' (' + d.type + ')'}">
            </option>
        </select>

        <!-- Employee -->
        <label>Employee</label>
        <select th:field="*{employee}">
            <option value="">-- Select Employee --</option>
            <option th:each="e : ${employees}"
                    th:value="${e.id}"
                    th:text="${e.name}">
            </option>
        </select>

        <!-- Issue Date -->
        <label>Issue Date</label>
        <input type="date" th:field="*{issueDate}" />

        <!-- Return Date -->
        <label>Return Date</label>
        <input type="date" th:field="*{returnDate}" />

        <!-- Status -->
        <input type="hidden" value="issued" name="status"/>

        <!-- Remarks -->
        <label>Remarks</label>
        <textarea th:field="*{remarks}"></textarea>

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
