<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assignments List</title>
    <style>
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        h2 { text-align: center; color: #333; }
        table { width: 80%; margin: 0 auto; border-collapse: collapse; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4CAF50; color: white; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h2>Assignments</h2>

<table border="1" width="100%">
    <thead>
        <tr>
            <th>ID</th>
            <th>Device</th>
            <th>Employee</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Status</th>
            <th>Remarks</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="a : ${assignments}">
            <td th:text="${a.id}"></td>

            <!-- Device info -->
            <td th:text="${a.device.serialNumber}"></td>

            <!-- Employee info -->
            <td th:text="${a.employee.name}"></td>

            <td th:text="${a.issueDate}"></td>
            <td th:text="${a.returnDate}"></td>
            <td th:text="${a.status}"></td>
            <td th:text="${a.remarks}"></td>

            <td>
                <a th:href="@{/assign/delete/{id}(id=${a.id})}"
                   onclick="return confirm('Delete?')">Delete</a>
                <a th:href="@{/assign/return/{id}(id=${a.id})}"
                   onclick="return confirm('Return?')">Return</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
