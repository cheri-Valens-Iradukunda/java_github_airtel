<!DOCTYPE html>
<html>
<head>
    <title>User Signup</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8, #d9e4ec);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 350px;
            transition: transform 0.2s ease-in-out;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #4CAF50;
            outline: none;
        }

        input[type=submit] {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        input[type=submit]:hover {
            background: #45a049;
        }

        .note {
            font-size: 0.85em;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>User Signup</h2>
        <form th:action="@{/users/}" method="post" th:object="${obj}">
			<input type="hidden" name="id" th:field="*{id}" />
            <label for="name">Full Name</label>
            <input type="text" name="username" id="name" th:field="*{username}" placeholder="Enter your full name" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" th:field="*{password}" placeholder="Enter a secure password" required>

            <label for="role">Role</label>
            <select name="role" th:field="*{role}" id="role" required>
                <option value="">-- Select Role --</option>
                <option value="Admin">Admin</option>
                <option value="User">User</option>
            </select>

            <input type="submit" value="Signup">
        </form>
        <div class="note">Already have an account? <a href="/users/auth">Login here</a></div>
    </div>
    
</body>
</html>
