<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
	
    <h2>Employee Form</h2>

    <form th:action="@{/employees/}" th:object="${obj}" method="post">

        <!-- Hidden ID (for update) -->
        <input type="hidden" th:field="*{id}" />

        <!-- Name -->
        <label>Name</label>
        <input type="text" th:field="*{name}" placeholder="Enter name" required />

        <!-- Email -->
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Enter email" required />

        <!-- Phone -->
        <label>Phone</label>
        <input type="text" th:field="*{phone}" placeholder="Enter phone" />

        <!-- Department (Dropdown) -->
        <label>Department</label>
        <select th:field="*{department}">
            <option value="">-- Select Department --</option>
            <option th:each="dept : ${departments}"
                    th:value="${dept.id}"
                    th:text="${dept.name}">
            </option>
        </select>

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
