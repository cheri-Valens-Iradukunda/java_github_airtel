<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments</title>
    <style>
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        h2 { text-align: center; color: #333; }
        table { width: 80%; margin: 0 auto; border-collapse: collapse; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4CAF50; color: white; }
        tr:hover { background: #f1f1f1; }
        a { margin-right: 10px; }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <h2>Departments</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Department Name</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dept : ${departments}">
                <td th:text="${dept.id}"></td>
                <td th:text="${dept.name}"></td>
                <td th:text="${dept.location}"></td>
                <td>
                    <a th:href="@{/department/update/{id}(id=${dept.id})}">Update</a>
                    <a th:href="@{/department/delete/{id}(id=${dept.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
