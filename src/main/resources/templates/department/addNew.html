<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Department</title>
    <style>
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .form-container { width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        input[type=submit] { background: #4CAF50; color: white; border: none; margin-top: 15px; cursor: pointer; }
        input[type=submit]:hover { background: #45a049; }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="form-container">
        <h2>Add Department</h2>
        <form th:action="@{/department}" method="post" th:object="${department}">
            <input type="hidden" th:field="*{id}" />
            
            <label for="name">Department Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter department name" required>
            
            <label for="location">Location</label>
            <input type="text" id="location" th:field="*{location}" placeholder="Enter location" required>
            
            <input type="submit" value="Save Department">
        </form>
    </div>
</body>
</html>
