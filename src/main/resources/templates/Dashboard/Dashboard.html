<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f9;
    }

    .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 30px;
    }

    .card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        transition: 0.3s;
        border-left: 5px solid #2980b9;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin: 0;
        color: #555;
        font-size: 18px;
    }

    .card p {
        font-size: 28px;
        margin-top: 10px;
        font-weight: bold;
        color:black;
    }
    .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
</style>
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="dashboard">
	
        <div class="card available">
            <p>Available Devices</p>
            <h2 th:text="${availableDeviceCount}">0</h2>
        </div>
        <div class="card available">
            <p>Issued Devices</p>
            <h2 th:text="${issuedDeviceCount}">0</h2>
        </div>
        <div class="card available">
            <p>Damaged Devices</p>
            <h2 th:text="${damagedDeviceCount}">0</h2>
        </div>
        <div class="card available">
            <p>Under repair Devices</p>
            <h2 th:text="${underRepairCount}">0</h2>
        </div>
        <div class="card available">
            <p>All Devices</p>
            <h2 th:text="${allDevicesCount}">0</h2>
        </div>
        <div class="card available">
            <p>Employees</p>
            <h2 th:text="${employeesCount}">0</h2>
        </div>
</div>

</body>
</html>
