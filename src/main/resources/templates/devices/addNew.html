<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Device Form</title>
    <link rel="stylesheet" th:href="@{../fragment/style.css}">
    <style>
        body { font-family: Arial; background: #f4f4f4; }
        .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }
        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
        .navbar {
    background-color: #2c3e50;
    display: flex;
    padding: 0 20px;
}

.navbar .dropdown {
    position: relative;
}

.navbar a {
    color: white;
    padding: 14px 18px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background-color: #34495e;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
}

.dropdown-content a:hover {
    background-color: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">
    <h2>Device Form</h2>

    <form th:action="@{/devices/}" th:object="${device}" method="post">

        <input type="hidden" th:field="*{id}" />

        <label>Serial Number</label>
        <input type="text" th:field="*{serialNumber}" required />

        <label>Type</label>
        <select th:field="*{type}">
            <option value="">-- Select Type --</option>
            <option value="Laptop">Laptop</option>
            <option value="Desktop">Desktop</option>
            <option value="Mobile">Mobile</option>
        </select>

        <label>Brand</label>
        <input type="text" th:field="*{brand}" />

        <label>Model</label>
        <input type="text" th:field="*{model}" />

        <label>Status</label>
        <select th:field="*{status}">
            <option value="">-- Select Status --</option>
            <option value="Available">Available</option>
            <option value="Issued">Issued</option>
            <option value="damaged">damaged</option>
            <option value="under repair">under repair</option>
        </select>

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
